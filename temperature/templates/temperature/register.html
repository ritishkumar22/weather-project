<style>
    /* Login जैसा ही स्टाइल इस्तेमाल करें */
    body { background: #1e3c72; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .card { background: rgba(0,0,0,0.5); padding: 30px; border-radius: 15px; width: 300px; text-align: center; }
